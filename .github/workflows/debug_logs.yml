name: Debug Logs

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch failed logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Listing recent runs:"
          gh run list --limit 10
          
          # Buscar el ID de la última ejecución (fallida o exitosa) del reporte
          LATEST_RUN=$(gh run list --workflow "Reporte Semanal de Metricas" --limit 1 --json databaseId --jq '.[0].databaseId')
          
          if [ -n "$LATEST_RUN" ] && [ "$LATEST_RUN" != "null" ]; then
            echo "Descargando logs para la ejecución: $LATEST_RUN"
            gh run view $LATEST_RUN --log > error_log.txt
          else
            echo "No se encontraron ejecuciones recientes." > error_log.txt
          fi

      - name: Commit and push logs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add error_log.txt
          git commit -m "Fetch error logs from failed run [skip ci]" || echo "No changes to commit"
          git push
